\* Bug hunting configuration for MC-4: Non-atomic finalization writes
\* Tests whether crash between finalization write and auth set write
\* leads to inconsistent persisted state

CONSTANTS
    Server = {s1, s2, s3}
    Block = {1, 2, 3, 4}
    MaxBlock = 4
    MaxRound = 2
    Byzantine = {s3}
    Quorum = 3
    InitAuthorities = {s1, s2, s3}
    NilBlock = 99

    \* Allow crashes during finalization sub-steps
    MaxStandardChangeLimit = 2
    MaxForcedChangeLimit = 1
    MaxCrashLimit = 3
    MaxBlockLimit = 4
    MaxByzantineVoteLimit = 2
    MaxFinalizationLimit = 5
    MaxMsgBufferLimit = 3

INIT MCInitMC4
NEXT MCNextMC4

SYMMETRY MCSymmetry

CONSTRAINT PendingChangeConstraint

INVARIANTS
    \* Core safety invariants
    FinalizationSafety
    ElectionSafety
    AuthoritySetConsistency
    FinalizedBlockExists
    RoundInBounds
    SetIdMonotonic
    FinalizedMonotonic
    \* MC-4 specific: persisted state consistency after non-atomic writes
    PersistedStateConsistency
