\* Model checking configuration for Substrate GRANDPA
\* Uses operator overrides to inject counter-bounded actions

CONSTANTS
    Server = {s1, s2, s3}
    Block = {1, 2, 3, 4}
    MaxBlock = 4
    MaxRound = 2
    Byzantine = {s3}
    \* n=3, f=1: safety requires quorum > n/2, and 3f+1 bound needs all 3
    Quorum = 3
    InitAuthorities = {s1, s2, s3}
    NilBlock = 99

    \* Counter bounds — fault injection limits
    MaxStandardChangeLimit = 3
    MaxForcedChangeLimit = 2
    MaxCrashLimit = 2
    MaxBlockLimit = 4
    MaxByzantineVoteLimit = 4
    MaxFinalizationLimit = 5
    MaxMsgBufferLimit = 3

\* Operator overrides: replace base spec actions with MC-bounded versions
\* ProduceBlock       <- MCProduceBlock
\* AddStandardChange  <- MCAddStandardChange
\* AddForcedChange    <- MCAddForcedChange
\* Crash              <- MCCrash
\* ByzantinePrevote   <- MCByzantinePrevote
\* ByzantinePrecommit <- MCByzantinePrecommit

INIT MCInit
NEXT MCNext

SYMMETRY MCSymmetry
VIEW MCView

CONSTRAINT PendingChangeConstraint

INVARIANTS
    FinalizationSafety
    ElectionSafety
    AuthoritySetConsistency
    \* VoteLimitRespected — removed: vote limit can decrease retroactively when
    \* standard changes are added after votes are cast. Guard enforcement at vote
    \* time (in Prevote/Precommit actions) is the correct check.
    NoPrevoteSkip
    ForcedChangeDependency
    \* StandardChangeOrdering — removed: when finalization jumps multiple blocks,
    \* multiple standard changes can become ready simultaneously. Deterministic
    \* ordering in ApplyStandardChange ensures they're applied correctly.
    FinalizedBlockExists
    RoundInBounds
    EquivocationCorrectness
    SetIdMonotonic
    FinalizedMonotonic

\* Temporal properties (require BFS, not simulation)
\* PROPERTIES
\*     RoundCompletion
\*     FinalityProgress
