\* Base configuration for Substrate GRANDPA spec
\* This config is used as a template; MC.cfg and Trace.cfg override operators.

CONSTANTS
    Server = {s1, s2, s3}
    Block = {1, 2, 3, 4, 5}
    MaxBlock = 5
    MaxRound = 3
    Byzantine = {s3}
    Quorum = 2
    InitAuthorities = {s1, s2, s3}
    NilBlock = 99

INIT Init
NEXT Next

INVARIANTS
    FinalizationSafety
    ElectionSafety
    AuthoritySetConsistency
    VoteLimitRespected
    NoPrevoteSkip
    ForcedChangeDependency
    StandardChangeOrdering
    FinalizedBlockExists
    RoundInBounds
    EquivocationCorrectness
