\* Simulation mode config for Substrate GRANDPA (v2 — pallet constraint + Precommit fix)
\* Use: java ... tlc2.TLC MC -simulate num=100000 -config MC_sim.cfg

CONSTANTS
    Server = {s1, s2, s3}
    Block = {1, 2, 3, 4}
    MaxBlock = 4
    MaxRound = 2
    Byzantine = {s3}
    Quorum = 3
    InitAuthorities = {s1, s2, s3}
    NilBlock = 99

    \* Counter bounds — original values
    MaxStandardChangeLimit = 3
    MaxForcedChangeLimit = 2
    MaxCrashLimit = 2
    MaxBlockLimit = 4
    MaxByzantineVoteLimit = 4
    MaxFinalizationLimit = 5
    MaxMsgBufferLimit = 3

INIT MCInit
NEXT MCNext

CONSTRAINT PendingChangeConstraint

INVARIANTS
    FinalizationSafety
    ElectionSafety
    AuthoritySetConsistency
    NoPrevoteSkip
    ForcedChangeDependency
    FinalizedBlockExists
    RoundInBounds
    EquivocationCorrectness
    SetIdMonotonic
    FinalizedMonotonic
