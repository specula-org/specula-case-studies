\* Bug hunting configuration for MC-1 and MC-2
\* Tests root-only vote limit and forced change dependency checks

CONSTANTS
    Server = {s1, s2, s3}
    Block = {1, 2, 3, 4}
    MaxBlock = 4
    MaxRound = 2
    Byzantine = {s3}
    Quorum = 3
    InitAuthorities = {s1, s2, s3}
    NilBlock = 99

    \* Counter bounds - allow enough standard changes for MC-1 scenario
    \* Need >= 2 standard changes on ancestor-descendant blocks
    MaxStandardChangeLimit = 3
    MaxForcedChangeLimit = 2
    MaxCrashLimit = 2
    MaxBlockLimit = 4
    MaxByzantineVoteLimit = 4
    MaxFinalizationLimit = 5
    MaxMsgBufferLimit = 3

INIT MCInit
NEXT MCNext

SYMMETRY MCSymmetry
VIEW MCView

CONSTRAINT PendingChangeConstraint

INVARIANTS
    \* Core safety invariants (must still hold)
    FinalizationSafety
    ElectionSafety
    AuthoritySetConsistency
    NoPrevoteSkip
    ForcedChangeDependency
    FinalizedBlockExists
    RoundInBounds
    EquivocationCorrectness
    SetIdMonotonic
    FinalizedMonotonic
    \* MC-1: Implementation's root-only vote limit matches correct all-changes limit
    VoteLimitImplMatchesCorrect
    \* MC-2: Implementation's root-only forced dep check is safe
    ForcedChangeDepsImplSafe
