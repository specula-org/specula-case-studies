\* Bug hunting configuration for MC-7: HasVoted overwrite on round completion
\* Tests whether completing round R overwrites HasVoted for R+1,
\* leading to equivocation after crash+recovery

CONSTANTS
    Server = {s1, s2, s3}
    Block = {1, 2, 3, 4}
    MaxBlock = 4
    MaxRound = 2
    Byzantine = {s3}
    Quorum = 3
    InitAuthorities = {s1, s2, s3}
    NilBlock = 99

    \* Allow enough actions for the crash+recovery equivocation scenario
    MaxStandardChangeLimit = 2
    MaxForcedChangeLimit = 1
    MaxCrashLimit = 3
    MaxBlockLimit = 4
    MaxByzantineVoteLimit = 2
    MaxFinalizationLimit = 5
    MaxMsgBufferLimit = 3

INIT MCInit
NEXT MCNextMC7

SYMMETRY MCSymmetry
VIEW MCView

CONSTRAINT PendingChangeConstraint

INVARIANTS
    \* Core safety invariants
    FinalizationSafety
    ElectionSafety
    AuthoritySetConsistency
    FinalizedBlockExists
    RoundInBounds
    SetIdMonotonic
    FinalizedMonotonic
    \* MC-7 specific: detect equivocation from HasVoted overwrite
    NoHonestEquivocation
