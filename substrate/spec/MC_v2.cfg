\* Model checking configuration for Substrate GRANDPA (v2 — with pallet constraint + Precommit fix)
\* Reduced bounds for faster BFS completion

CONSTANTS
    Server = {s1, s2, s3}
    Block = {1, 2, 3, 4}
    MaxBlock = 4
    MaxRound = 2
    Byzantine = {s3}
    Quorum = 3
    InitAuthorities = {s1, s2, s3}
    NilBlock = 99

    \* Counter bounds — tighter for faster BFS
    MaxStandardChangeLimit = 2
    MaxForcedChangeLimit = 1
    MaxCrashLimit = 2
    MaxBlockLimit = 3
    MaxByzantineVoteLimit = 3
    MaxFinalizationLimit = 4
    MaxMsgBufferLimit = 2

INIT MCInit
NEXT MCNext

SYMMETRY MCSymmetry
VIEW MCView

CONSTRAINT PendingChangeConstraint

INVARIANTS
    FinalizationSafety
    ElectionSafety
    AuthoritySetConsistency
    NoPrevoteSkip
    ForcedChangeDependency
    FinalizedBlockExists
    RoundInBounds
    EquivocationCorrectness
    SetIdMonotonic
    FinalizedMonotonic
