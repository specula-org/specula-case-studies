\* Bug hunting configuration for MC-2 only: Forced change dependency check
\* Tests whether root-only dep check misses non-root standard dependencies

CONSTANTS
    Server = {s1, s2, s3}
    Block = {1, 2, 3, 4}
    MaxBlock = 4
    MaxRound = 2
    Byzantine = {s3}
    Quorum = 3
    InitAuthorities = {s1, s2, s3}
    NilBlock = 99

    \* Need enough actions for: blocks + std changes + finalize + forced change
    MaxStandardChangeLimit = 3
    MaxForcedChangeLimit = 2
    MaxCrashLimit = 1
    MaxBlockLimit = 4
    MaxByzantineVoteLimit = 4
    MaxFinalizationLimit = 5
    MaxMsgBufferLimit = 3

INIT MCInit
NEXT MCNext

SYMMETRY MCSymmetry
VIEW MCView

CONSTRAINT PendingChangeConstraint

INVARIANTS
    FinalizationSafety
    ElectionSafety
    AuthoritySetConsistency
    NoPrevoteSkip
    ForcedChangeDependency
    FinalizedBlockExists
    RoundInBounds
    EquivocationCorrectness
    SetIdMonotonic
    FinalizedMonotonic
    \* MC-2 only: check forced change dep implementation correctness
    ForcedChangeDepsImplSafe
