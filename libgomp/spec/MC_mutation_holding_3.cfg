\* Mutation test: PrimaryCompleteBarrier for BarrierFinal without holding=TRUE
\* Expected: HoldingCorrectness or HoldingImpliesFinalType violated

SPECIFICATION MCSpec

CONSTANTS
    Thread = {0, 1, 2}
    MaxBarriers = 3
    MaxTasks = 1
    Nil = Nil
    BarrierNormal = "BarrierNormal"
    BarrierFinal = "BarrierFinal"
    BarrierCancel = "BarrierCancel"

    MaxScheduleTaskLimit = 1
    MaxCancelLimit = 1
    BarrierTypeSet = {"BarrierFinal"}

VIEW ModelView

INVARIANTS
    BarrierSafety
    HoldingCorrectness
    HoldingImpliesFinalType
    SecondaryStateConsistency
    CgenConsistency
    NoStaleFlags
    FinalBarrierRequiresHolding
    UnreleasedSecondariesRequirePrevHolding
