\* Deep exploration config: higher bounds for thorough checking
\* All barrier types, tasks, cancellation, all invariants

SPECIFICATION MCSpec

CONSTANTS
    Thread = {0, 1, 2, 3}
    MaxBarriers = 3
    MaxTasks = 2
    Nil = Nil
    BarrierNormal = "BarrierNormal"
    BarrierFinal = "BarrierFinal"
    BarrierCancel = "BarrierCancel"

    MaxScheduleTaskLimit = 3
    MaxCancelLimit = 2
    BarrierTypeSet = {"BarrierNormal", "BarrierFinal", "BarrierCancel"}

VIEW ModelView

INVARIANTS
    TypeOK
    BarrierSafety
    PcInRange
    ScanIndexValid
    RoundBound
    TaskCountBound
    ThreadGenMonotonic
    FallbackCorrectness
    CancelFlagCleanup
    CgenConsistency
    HoldingCorrectness
    TaskIsolation
    WaitingForTaskImpliesAllArrived
    SecondaryStateConsistency
    NoStaleFlags
    HoldingImpliesFinalType
    PrimaryFallbackConsistency
    NoUseAfterFree
