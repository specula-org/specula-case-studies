\* Large-scale BFS config: 5 threads, 6 barriers, expanded task/cancel bounds
\* Targets deeper interleavings unreachable by 4-thread configs

SPECIFICATION MCSpec

CONSTANTS
    Thread = {0, 1, 2, 3, 4}
    MaxBarriers = 6
    MaxTasks = 3
    Nil = Nil
    BarrierNormal = "BarrierNormal"
    BarrierFinal = "BarrierFinal"
    BarrierCancel = "BarrierCancel"

    MaxScheduleTaskLimit = 4
    MaxCancelLimit = 4
    BarrierTypeSet = {"BarrierNormal", "BarrierFinal", "BarrierCancel"}

VIEW ModelView

INVARIANTS
    TypeOK
    BarrierSafety
    PcInRange
    ScanIndexValid
    RoundBound
    TaskCountBound
    ThreadGenMonotonic
    FallbackCorrectness
    CancelFlagCleanup
    CgenConsistency
    HoldingCorrectness
    TaskIsolation
    WaitingForTaskImpliesAllArrived
    SecondaryStateConsistency
    NoStaleFlags
    HoldingImpliesFinalType
    PrimaryFallbackConsistency
    NoUseAfterFree
