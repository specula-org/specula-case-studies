\* Simulation config: extreme bounds for random exploration
\* 6 threads, 10 barriers, high task/cancel — not exhaustive

SPECIFICATION MCSpec

CONSTANTS
    Thread = {0, 1, 2, 3, 4, 5}
    MaxBarriers = 10
    MaxTasks = 5
    Nil = Nil
    BarrierNormal = "BarrierNormal"
    BarrierFinal = "BarrierFinal"
    BarrierCancel = "BarrierCancel"

    MaxScheduleTaskLimit = 8
    MaxCancelLimit = 6
    BarrierTypeSet = {"BarrierNormal", "BarrierFinal", "BarrierCancel"}

VIEW ModelView

INVARIANTS
    TypeOK
    BarrierSafety
    PcInRange
    ScanIndexValid
    RoundBound
    TaskCountBound
    ThreadGenMonotonic
    FallbackCorrectness
    CancelFlagCleanup
    CgenConsistency
    HoldingCorrectness
    TaskIsolation
    WaitingForTaskImpliesAllArrived
    SecondaryStateConsistency
    NoStaleFlags
    HoldingImpliesFinalType
    PrimaryFallbackConsistency
    NoUseAfterFree
