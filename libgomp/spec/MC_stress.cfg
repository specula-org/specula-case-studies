\* Stress test config: maximum bounds for exhaustive checking
\* 4 threads, 4 barrier rounds, 2 tasks, 3 cancels

SPECIFICATION MCSpec

CONSTANTS
    Thread = {0, 1, 2, 3}
    MaxBarriers = 4
    MaxTasks = 2
    Nil = Nil
    BarrierNormal = "BarrierNormal"
    BarrierFinal = "BarrierFinal"
    BarrierCancel = "BarrierCancel"

    MaxScheduleTaskLimit = 3
    MaxCancelLimit = 3
    BarrierTypeSet = {"BarrierNormal", "BarrierFinal", "BarrierCancel"}

VIEW ModelView

INVARIANTS
    TypeOK
    BarrierSafety
    PcInRange
    ScanIndexValid
    RoundBound
    TaskCountBound
    ThreadGenMonotonic
    FallbackCorrectness
    CancelFlagCleanup
    CgenConsistency
    HoldingCorrectness
    TaskIsolation
    WaitingForTaskImpliesAllArrived
    SecondaryStateConsistency
    NoStaleFlags
    HoldingImpliesFinalType
    PrimaryFallbackConsistency
    NoUseAfterFree
