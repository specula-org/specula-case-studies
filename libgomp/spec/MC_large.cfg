SPECIFICATION MCSpec

CONSTANTS
    Thread = {0, 1, 2, 3}
    MaxBarriers = 3
    MaxTasks = 2
    Nil = Nil
    BarrierNormal = "BarrierNormal"
    BarrierFinal = "BarrierFinal"
    BarrierCancel = "BarrierCancel"

    \* MC bounds
    MaxScheduleTaskLimit = 2
    MaxCancelLimit = 2
    BarrierTypeSet = {"BarrierNormal", "BarrierFinal", "BarrierCancel"}

VIEW ModelView

INVARIANTS
    \* Type safety
    TypeOK

    \* Core safety
    BarrierSafety

    \* Structural
    PcInRange
    ScanIndexValid
    RoundBound
    TaskCountBound
    ThreadGenMonotonic

    \* Bug-family invariants
    FallbackCorrectness
    CancelFlagCleanup
    CgenConsistency
    HoldingCorrectness
    TaskIsolation

    \* Strengthened invariants
    WaitingForTaskImpliesAllArrived
    SecondaryStateConsistency
    NoStaleFlags
    HoldingImpliesFinalType
    PrimaryFallbackConsistency
    NoUseAfterFree
