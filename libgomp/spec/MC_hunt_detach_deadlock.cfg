\* Hunting config: Bug #29 — omp_fulfill_event deadlock from unshackled thread
\* Focus: FulfillEvent wakes a barrier thread but does not set BAR_TASK_PENDING.
\* The woken thread sees no generation change and goes back to sleep. DEADLOCK.
\* Requires: one detach task scheduled, body completes, then fulfill from external thread.
\* Expected: DetachFulfillNoDeadlock invariant violation.

SPECIFICATION MCSpec

CONSTANTS
    Thread = {0, 1, 2}
    MaxBarriers = 1
    MaxTasks = 1
    Nil = Nil
    BarrierNormal = "BarrierNormal"
    BarrierFinal = "BarrierFinal"
    BarrierCancel = "BarrierCancel"

    MaxScheduleTaskLimit = 0
    MaxDetachScheduleLimit = 1
    MaxCancelLimit = 0
    BarrierTypeSet = {"BarrierNormal"}

VIEW ModelView

INVARIANTS
    DetachFulfillNoDeadlock
    BarrierSafety
    WaitingForTaskImpliesAllArrived
