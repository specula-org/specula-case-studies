SPECIFICATION MCSpec

CONSTANTS
    Server = {s1, s2, s3}
    MaxHeight = 2
    MaxRound = 2
    Nil = Nil
    NilVote = NilVote
    Values = {v1, v2}

    ProposalMsg = "ProposalMsg"
    PrevoteMsg = "PrevoteMsg"
    PrecommitMsg = "PrecommitMsg"

    StepNewHeight = "StepNewHeight"
    StepNewRound = "StepNewRound"
    StepPropose = "StepPropose"
    StepPrevote = "StepPrevote"
    StepPrevoteWait = "StepPrevoteWait"
    StepPrecommit = "StepPrecommit"
    StepPrecommitWait = "StepPrecommitWait"
    StepCommit = "StepCommit"

    ValidVE = "ValidVE"
    InvalidVE = "InvalidVE"
    NoVE = "NoVE"

    DuplicateVoteEv = "DuplicateVoteEv"

    \* Combined crash + VE injection + message loss
    MaxTimeoutLimit = 5
    MaxCrashLimit = 2
    MaxLoseLimit = 2
    MaxInvalidVELimit = 1
    MaxMsgBufferLimit = 15

SYMMETRY Symmetry
VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    \* Core safety
    ElectionSafety
    Validity
    LockSafety
    POLRoundValidity
    CommittedBlockDurability
    EvidenceUniqueness

    \* VE-specific
    VELivenessInv
    VEConsistency
    VEVerificationTracked

    \* Crash recovery
    CrashRecoveryConsistency
    PrivvalConsistency

    \* Structural
    RoundBound
    HeightBound
    LockedRoundBound
    ValidRoundBound
    LockConsistency
    ValidConsistency
    VoteCountBound
    DecisionStability
    CrashedNoTimeouts
