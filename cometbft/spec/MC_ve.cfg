SPECIFICATION MCSpec

CONSTANTS
    Server = {s1, s2, s3}
    MaxHeight = 2
    MaxRound = 2
    Nil = Nil
    NilVote = NilVote
    Values = {v1, v2}

    ProposalMsg = "ProposalMsg"
    PrevoteMsg = "PrevoteMsg"
    PrecommitMsg = "PrecommitMsg"

    StepNewHeight = "StepNewHeight"
    StepNewRound = "StepNewRound"
    StepPropose = "StepPropose"
    StepPrevote = "StepPrevote"
    StepPrevoteWait = "StepPrevoteWait"
    StepPrecommit = "StepPrecommit"
    StepPrecommitWait = "StepPrecommitWait"
    StepCommit = "StepCommit"

    ValidVE = "ValidVE"
    InvalidVE = "InvalidVE"
    NoVE = "NoVE"

    DuplicateVoteEv = "DuplicateVoteEv"

    \* MC bounds — isolate VE-induced deadlock
    MaxTimeoutLimit = 20
    MaxCrashLimit = 0
    MaxLoseLimit = 0
    MaxInvalidVELimit = 1
    MaxMsgBufferLimit = 20

SYMMETRY Symmetry
VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    ElectionSafety
    Validity
    LockSafety
    POLRoundValidity
    VELivenessInv

    RoundBound
    HeightBound
    LockedRoundBound
    ValidRoundBound
    LockConsistency
    ValidConsistency
    VoteCountBound
    DecisionStability
