SPECIFICATION MCSpec

CONSTANTS
    Server = {s1, s2, s3}
    MaxHeight = 2
    MaxRound = 2
    Nil = Nil
    NilVote = NilVote
    Values = {v1, v2}

    ProposalMsg = "ProposalMsg"
    PrevoteMsg = "PrevoteMsg"
    PrecommitMsg = "PrecommitMsg"

    StepNewHeight = "StepNewHeight"
    StepNewRound = "StepNewRound"
    StepPropose = "StepPropose"
    StepPrevote = "StepPrevote"
    StepPrevoteWait = "StepPrevoteWait"
    StepPrecommit = "StepPrecommit"
    StepPrecommitWait = "StepPrecommitWait"
    StepCommit = "StepCommit"

    ValidVE = "ValidVE"
    InvalidVE = "InvalidVE"
    NoVE = "NoVE"

    DuplicateVoteEv = "DuplicateVoteEv"

    \* MC bounds
    MaxTimeoutLimit = 5
    MaxCrashLimit = 2
    MaxLoseLimit = 3
    MaxInvalidVELimit = 2
    MaxMsgBufferLimit = 10

SYMMETRY Symmetry
VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    \* Standard safety
    ElectionSafety
    Validity
    LockSafety
    POLRoundValidity
    CommittedBlockDurability
    EvidenceUniqueness

    \* Structural
    RoundBound
    HeightBound
    LockedRoundBound
    ValidRoundBound
    LockConsistency
    ValidConsistency
    VoteCountBound
    DecisionStability
    CrashedNoTimeouts
    PrivvalConsistency

PROPERTIES
    MonotonicHeight
    MonotonicRound
    DecisionPermanence
