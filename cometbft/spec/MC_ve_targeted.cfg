SPECIFICATION MCSpecVE

CONSTANTS
    Server = {s1, s2, s3}
    MaxHeight = 2
    MaxRound = 1
    Nil = Nil
    NilVote = NilVote
    Values = {v1}

    ProposalMsg = "ProposalMsg"
    PrevoteMsg = "PrevoteMsg"
    PrecommitMsg = "PrecommitMsg"

    StepNewHeight = "StepNewHeight"
    StepNewRound = "StepNewRound"
    StepPropose = "StepPropose"
    StepPrevote = "StepPrevote"
    StepPrevoteWait = "StepPrevoteWait"
    StepPrecommit = "StepPrecommit"
    StepPrecommitWait = "StepPrecommitWait"
    StepCommit = "StepCommit"

    ValidVE = "ValidVE"
    InvalidVE = "InvalidVE"
    NoVE = "NoVE"

    DuplicateVoteEv = "DuplicateVoteEv"

    \* Targeted VE test: no crashes, no message loss, no more VE injections
    MaxTimeoutLimit = 10
    MaxCrashLimit = 0
    MaxLoseLimit = 0
    MaxInvalidVELimit = 0
    MaxMsgBufferLimit = 20

SYMMETRY Symmetry
VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    ElectionSafety
    Validity
    LockSafety

    RoundBound
    HeightBound
