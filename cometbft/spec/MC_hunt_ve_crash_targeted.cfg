SPECIFICATION MCSpecVE

CONSTANTS
    Server = {s1, s2, s3}
    MaxHeight = 2
    MaxRound = 1
    Nil = Nil
    NilVote = NilVote
    Values = {v1, v2}

    ProposalMsg = "ProposalMsg"
    PrevoteMsg = "PrevoteMsg"
    PrecommitMsg = "PrecommitMsg"

    StepNewHeight = "StepNewHeight"
    StepNewRound = "StepNewRound"
    StepPropose = "StepPropose"
    StepPrevote = "StepPrevote"
    StepPrevoteWait = "StepPrevoteWait"
    StepPrecommit = "StepPrecommit"
    StepPrecommitWait = "StepPrecommitWait"
    StepCommit = "StepCommit"

    ValidVE = "ValidVE"
    InvalidVE = "InvalidVE"
    NoVE = "NoVE"

    DuplicateVoteEv = "DuplicateVoteEv"

    \* Pre-injected InvalidVE + crash + message loss
    MaxTimeoutLimit = 5
    MaxCrashLimit = 1
    MaxLoseLimit = 2
    MaxInvalidVELimit = 0
    MaxMsgBufferLimit = 15

SYMMETRY Symmetry
VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    ElectionSafety
    Validity
    LockSafety
    VELivenessInv
    VEConsistency
    CommittedBlockDurability
    CrashRecoveryConsistency
    PrivvalConsistency
    RoundBound
    HeightBound
