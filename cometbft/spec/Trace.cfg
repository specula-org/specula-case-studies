INIT TraceInit
NEXT TraceNext

CONSTANTS
    Server = {"s1", "s2", "s3"}
    MaxHeight = 3
    MaxRound = 3
    Nil = "Nil"
    NilVote = "NilVote"
    Values = {"v1", "v2"}

    ProposalMsg = "ProposalMsg"
    PrevoteMsg = "PrevoteMsg"
    PrecommitMsg = "PrecommitMsg"

    StepNewHeight = "StepNewHeight"
    StepNewRound = "StepNewRound"
    StepPropose = "StepPropose"
    StepPrevote = "StepPrevote"
    StepPrevoteWait = "StepPrevoteWait"
    StepPrecommit = "StepPrecommit"
    StepPrecommitWait = "StepPrecommitWait"
    StepCommit = "StepCommit"

    ValidVE = "ValidVE"
    InvalidVE = "InvalidVE"
    NoVE = "NoVE"

    DuplicateVoteEv = "DuplicateVoteEv"

    \* Override base.tla's Proposer with trace-derived proposer
    Proposer <- TraceProposer

    \* Override base.tla's ChooseValue with trace-derived proposal value
    ChooseValue <- TraceChooseValue

VIEW TraceView

ALIAS TraceAlias

\* Trace completion checked via deadlock detection (default ON with INIT/NEXT).
\* If TLC reports deadlock, the trace could not be fully consumed.
\* TraceMatched temporal property is not used (trivially fails without fairness).
