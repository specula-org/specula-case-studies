\* Hunting config: Missing lock check with DA-1 FIXED.
\*
\* Target: Honest servers vote for conflicting values across views
\* because there is no lock check in ReceivePrepare.
\* Byzantine leader in view 2 proposes v2 after v1 committed in view 1.
\*
\* Key: No timeouts needed! The attack bypasses TC entirely.

SPECIFICATION MCFixedSpec

CONSTANTS
    Server = {s1, s2, s3, s4}
    MaxSlot = 1
    MaxView = 2
    K = 1
    Nil = Nil
    Values = {v1, v2}
    Byzantine = {s4}

    PrepareMsg = "PrepareMsg"
    ConfirmMsg = "ConfirmMsg"
    CommitMsg = "CommitMsg"
    TimeoutMsg = "TimeoutMsg"

    \* Minimal bounds: 1 Byzantine msg, no timeouts, no message loss
    MaxByzantineLimit = 1
    MaxTimeoutLimit = 0
    MaxLoseLimit = 0
    MaxMsgBufferLimit = 6

VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    MCAgreementSafety
