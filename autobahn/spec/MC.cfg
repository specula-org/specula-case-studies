SPECIFICATION MCSpec

CONSTANTS
    Server = {s1, s2, s3, s4}
    MaxSlot = 1
    MaxView = 3
    K = 1
    Nil = Nil
    Values = {v1, v2}
    Byzantine = {s4}

    PrepareMsg = "PrepareMsg"
    ConfirmMsg = "ConfirmMsg"
    CommitMsg = "CommitMsg"
    TimeoutMsg = "TimeoutMsg"

    \* MC bounds
    MaxByzantineLimit = 3
    MaxTimeoutLimit = 6
    MaxLoseLimit = 2
    MaxMsgBufferLimit = 12

SYMMETRY HonestSymmetry
VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    \* Standard safety
    MCAgreementSafety
    MCCommitValidity
    MCTypeOK

    \* Structural
    MCViewBound

    \* Bug-family-specific (uncomment for targeted hunting)
    \* MCViewChangeSafety
    \* MCFastPathCorrectness
