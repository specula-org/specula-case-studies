\* Hunting config: View change safety with DA-1 FIXED.
\*
\* Target: Can a Byzantine leader in a later view break AgreementSafety?
\* Leader(1,2) = s4 (Byzantine). After v1 committed in view 1,
\* Byzantine s4 proposes v2 in view 2. Honest servers vote for v2
\* (no lock check DA-8, no committed check), v2 gets committed.
\*
\* MaxView=2. Byzantine = {s4} so s4 is Byzantine leader for (slot=1, view=2).

SPECIFICATION MCFixedSpec

CONSTANTS
    Server = {s1, s2, s3, s4}
    MaxSlot = 1
    MaxView = 2
    K = 1
    Nil = Nil
    Values = {v1, v2}
    Byzantine = {s4}

    PrepareMsg = "PrepareMsg"
    ConfirmMsg = "ConfirmMsg"
    CommitMsg = "CommitMsg"
    TimeoutMsg = "TimeoutMsg"

    MaxByzantineLimit = 2
    MaxTimeoutLimit = 3
    MaxLoseLimit = 0
    MaxMsgBufferLimit = 10

VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    MCAgreementSafety
