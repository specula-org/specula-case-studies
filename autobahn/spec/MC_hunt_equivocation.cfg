\* Hunting config for Family 1: Proposal Binding & Equivocation
\* Target: Byzantine leader equivocates by sending different proposals.
\* QC doesn't bind to proposals. AgreementSafety should be violated.

SPECIFICATION MCSpec

CONSTANTS
    Server = {s1, s2, s3, s4}
    MaxSlot = 1
    MaxView = 2
    K = 1
    Nil = Nil
    Values = {v1, v2}
    Byzantine = {s1}

    PrepareMsg = "PrepareMsg"
    ConfirmMsg = "ConfirmMsg"
    CommitMsg = "CommitMsg"
    TimeoutMsg = "TimeoutMsg"

    \* Tight bounds: focus on equivocation, minimal view changes
    MaxByzantineLimit = 4
    MaxTimeoutLimit = 0
    MaxLoseLimit = 0
    MaxMsgBufferLimit = 10

SYMMETRY HonestSymmetry
VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    MCAgreementSafety
