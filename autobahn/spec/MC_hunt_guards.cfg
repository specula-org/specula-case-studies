\* Hunting config for Family 3: Message Acceptance Guards
\* Target: Missing guards (no leader check, no confirm duplicate guard,
\* voting on committed slots).
\* AgreementSafety should be violated.

SPECIFICATION MCSpec

CONSTANTS
    Server = {s1, s2, s3, s4}
    MaxSlot = 1
    MaxView = 3
    K = 1
    Nil = Nil
    Values = {v1, v2}
    Byzantine = {s4}

    PrepareMsg = "PrepareMsg"
    ConfirmMsg = "ConfirmMsg"
    CommitMsg = "CommitMsg"
    TimeoutMsg = "TimeoutMsg"

