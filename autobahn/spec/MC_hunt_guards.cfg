    MaxByzantineLimit = 3
    MaxTimeoutLimit = 6
    MaxLoseLimit = 1
    MaxMsgBufferLimit = 12

SYMMETRY HonestSymmetry
VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    MCAgreementSafety
