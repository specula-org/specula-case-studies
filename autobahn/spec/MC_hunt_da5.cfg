\* Hunting config for DA-5 (View Change Winning View Bug) with DA-1 FIXED.
\*
\* DA-5: In get_winning_proposals(), winning_view is set to timeout.view
\* instead of the highQC's actual view (messages.rs:1455).
\* This means the new leader may select the wrong locked value.
\*
\* Requires MaxView >= 3 so that a timeout in view 2 can carry
\* a highQC from view 1 (where timeout.view=2 != highQC.view=1).
\*
\* Byzantine = {s1}: one Byzantine node to trigger equivocation
\* in view 3 after a view change.

SPECIFICATION MCFixedSpec

CONSTANTS
    Server = {s1, s2, s3, s4}
    MaxSlot = 1
    MaxView = 3
    K = 1
    Nil = Nil
    Values = {v1, v2}
    Byzantine = {s1}

    PrepareMsg = "PrepareMsg"
    ConfirmMsg = "ConfirmMsg"
    CommitMsg = "CommitMsg"
    TimeoutMsg = "TimeoutMsg"

    \* Allow enough faults to exercise view change path
    MaxByzantineLimit = 3
    MaxTimeoutLimit = 4
    MaxLoseLimit = 2
    MaxMsgBufferLimit = 12

\* No symmetry — need to distinguish servers for leader rotation
VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    MCAgreementSafety
    MCViewChangeSafety
