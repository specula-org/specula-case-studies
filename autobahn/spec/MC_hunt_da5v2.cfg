\* Hunting config for DA-5 (wrong winning_view) with DA-1 FIXED + DA-2/DA-3.
\*
\* DA-5: get_winning_proposals() sets winning_view = timeout.view instead
\* of the highQC's actual view (messages.rs:1455).
\*
\* Requires MaxView >= 3 so that:
\* - View 1: v1 gets ConfirmQC (highQC.view=1)
\* - View 2: different activity, possibly v2 gets evidence
\* - View 2 times out. Timeouts carry different highQC views (1 vs 2)
\* - View 3: buggy selection picks lower QC view's value
\*
\* Byzantine = {s1}: one Byzantine for TC forgery + equivocation.

SPECIFICATION MCHuntDA5Spec

CONSTANTS
    Server = {s1, s2, s3, s4}
    MaxSlot = 1
    MaxView = 3
    K = 1
    Nil = Nil
    Values = {v1, v2}
    Byzantine = {s1}

    PrepareMsg = "PrepareMsg"
    ConfirmMsg = "ConfirmMsg"
    CommitMsg = "CommitMsg"
    TimeoutMsg = "TimeoutMsg"

    \* Need more budget for 3 views of Byzantine activity
    MaxByzantineLimit = 8
    MaxTimeoutLimit = 5
    MaxLoseLimit = 3
    MaxMsgBufferLimit = 12

VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    MCAgreementSafety
    MCViewChangeSafety
