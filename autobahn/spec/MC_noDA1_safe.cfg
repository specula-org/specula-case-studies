\* Sanity check: MC_noDA1 with NO Byzantine nodes.
\* With DA-1 fixed and no Byzantine behavior, AgreementSafety must hold.

SPECIFICATION MCFixedSpec

CONSTANTS
    Server = {s1, s2, s3, s4}
    MaxSlot = 1
    MaxView = 2
    K = 1
    Nil = Nil
    Values = {v1, v2}
    Byzantine = {}

    PrepareMsg = "PrepareMsg"
    ConfirmMsg = "ConfirmMsg"
    CommitMsg = "CommitMsg"
    TimeoutMsg = "TimeoutMsg"

    MaxByzantineLimit = 0
    MaxTimeoutLimit = 3
    MaxLoseLimit = 0
    MaxMsgBufferLimit = 8

SYMMETRY HonestSymmetry
VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    MCAgreementSafety
    MCCommitValidity
