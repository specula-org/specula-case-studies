\* Hunting config for DA-2+DA-3 (Byzantine TC forgery) with DA-1 FIXED.
\*
\* DA-2: Timeout::digest() hashes nothing → forgeable timeouts.
\* DA-3: TC::verify() always passes → forged TC accepted.
\* Combined: Byzantine can force view changes with fake evidence.
\*
\* Attack scenario:
\* 1. View 1: v1 committed by some honest nodes
\* 2. Commit to other honest nodes lost (LoseMessage)
\* 3. Byzantine injects fake timeout (ByzantineTimeout) → quorum reached
\* 4. Honest nodes advance to view 2
\* 5. Byzantine proposes v2, votes for v2 (ByzantineVotePrepare)
\* 6. Remaining honest nodes vote for v2 → quorum (2 honest + 1 Byzantine)
\* 7. v2 committed → AgreementSafety violated
\*
\* Byzantine = {s1}: one Byzantine node for TC forgery + voting.

SPECIFICATION MCHuntDA23Spec

CONSTANTS
    Server = {s1, s2, s3, s4}
    MaxSlot = 1
    MaxView = 2
    K = 1
    Nil = Nil
    Values = {v1, v2}
    Byzantine = {s1}

    PrepareMsg = "PrepareMsg"
    ConfirmMsg = "ConfirmMsg"
    CommitMsg = "CommitMsg"
    TimeoutMsg = "TimeoutMsg"

    \* Byzantine budget: timeout + votePrepare + voteConfirm + prepare + commit
    MaxByzantineLimit = 6
    MaxTimeoutLimit = 3
    MaxLoseLimit = 2
    MaxMsgBufferLimit = 10

VIEW ModelView
CONSTRAINT MsgBufferConstraint

INVARIANTS
    MCAgreementSafety
