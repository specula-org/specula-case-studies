SPECIFICATION MCSpec

CONSTANTS
    s1 = s1
    s2 = s2
    s3 = s3
    s4 = s4

    Server = {s1, s2, s3, s4}

    \* Constraint limits — same as MC.cfg (proven tractable)
    MaxRoundLimit       = 2
    MaxRoundExpiryLimit = 3
    CrashLimit          = 1
    LoseLimit           = 1
    BlockTimerLimit     = 4
    MaxMsgBufferLimit   = 6

    \* Action overrides
    BlockTimerExpiry <- MCBlockTimerExpiry
    RoundExpiry      <- MCRoundExpiry
    Crash            <- MCCrash
    LoseMessage      <- MCLoseMessage

    \* Type constants
    Nil = Nil

    Proposing  = Proposing
    Prepared   = Prepared
    Committed  = Committed

    ProposalMsg    = ProposalMsg
    PrepareMsg     = PrepareMsg
    CommitMsg      = CommitMsg
    RoundChangeMsg = RoundChangeMsg

    \* Round-robin proposer override
    Proposer <- MCProposer

CHECK_DEADLOCK
    FALSE

CONSTRAINT
    MsgBufferConstraint

\* ============================================================================
\* Core QBFT Safety Invariants (from base spec)
\* ============================================================================
INVARIANTS
    Agreement
    Validity
    PreparedBlockIntegrity
    CommitLatchConsistency
    CommittedMonotonic

\* ============================================================================
\* Previously unchecked invariants (MC-3 target)
\* ============================================================================
INVARIANTS
    RoundChangeSafety
    PhaseConsistency

\* ============================================================================
\* Structural Safety Invariants (from MC spec)
\* ============================================================================
INVARIANTS
    RoundBoundInv
    ImportImpliesHeightInv
    CommittedImpliesProposalInv

\* ============================================================================
\* Temporal Properties
\* ============================================================================
PROPERTIES
    MonotonicRoundProp
    MonotonicBlockchainHeightProp
