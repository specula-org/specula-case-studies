SPECIFICATION MCSpec

CONSTANTS
    s1 = s1
    s2 = s2
    s3 = s3
    s4 = s4

    Server = {s1, s2, s3, s4}

    \* Constraint limits — simulation mode uses larger bounds
    MaxRoundLimit       = 3
    MaxRoundExpiryLimit = 6
    CrashLimit          = 1
    LoseLimit           = 2
    BlockTimerLimit     = 5
    MaxMsgBufferLimit   = 12

    \* Action overrides (inject counter constraints via operator replacement)
    BlockTimerExpiry <- MCBlockTimerExpiry
    RoundExpiry      <- MCRoundExpiry
    Crash            <- MCCrash
    LoseMessage      <- MCLoseMessage

    \* Type constants
    Nil = Nil

    Proposing  = Proposing
    Prepared   = Prepared
    Committed  = Committed

    ProposalMsg    = ProposalMsg
    PrepareMsg     = PrepareMsg
    CommitMsg      = CommitMsg
    RoundChangeMsg = RoundChangeMsg

    \* Round-robin proposer override
    Proposer <- MCProposer

CHECK_DEADLOCK
    FALSE

\* No CONSTRAINT needed for simulation (trace depth is bounded by -depth)

\* ============================================================================
\* Core QBFT Safety Invariants (from base spec)
\* ============================================================================
INVARIANTS
    Agreement
    Validity
    PreparedBlockIntegrity
    CommitLatchConsistency
    CommittedMonotonic

\* ============================================================================
\* Structural Safety Invariants (from MC spec)
\* ============================================================================
INVARIANTS
    RoundBoundInv
    ImportImpliesHeightInv
    CommittedImpliesProposalInv

\* No PROPERTIES — simulation mode cannot check temporal properties
