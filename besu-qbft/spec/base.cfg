SPECIFICATION Spec

CONSTANTS
    Server = {s1, s2, s3, s4}

    Proposing  = Proposing
    Prepared   = Prepared
    Committed  = Committed

    Nil = Nil

    ProposalMsg    = ProposalMsg
    PrepareMsg     = PrepareMsg
    CommitMsg      = CommitMsg
    RoundChangeMsg = RoundChangeMsg

    \* Round-robin proposer selection
    Proposer(h, r) == CHOOSE s \in Server : TRUE

INVARIANTS
    Agreement
    Validity
    PreparedBlockIntegrity
    CommitLatchConsistency
    CommittedMonotonic
