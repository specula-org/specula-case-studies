SPECIFICATION MCSpec

CONSTANTS
    s1 = s1
    s2 = s2
    s3 = s3
    s4 = s4

    Server = {s1, s2, s3, s4}

    \* Constraint limits — simulation config
    MaxRoundLimit       = 3
    MaxRoundExpiryLimit = 6
    CrashLimit          = 1
    LoseLimit           = 2
    BlockTimerLimit     = 5
    MaxMsgBufferLimit   = 12

    \* Action overrides
    BlockTimerExpiry <- MCBlockTimerExpiry
    RoundExpiry      <- MCRoundExpiry
    Crash            <- MCCrash
    LoseMessage      <- MCLoseMessage

    \* Type constants
    Nil = Nil

    Proposing  = Proposing
    Prepared   = Prepared
    Committed  = Committed

    ProposalMsg    = ProposalMsg
    PrepareMsg     = PrepareMsg
    CommitMsg      = CommitMsg
    RoundChangeMsg = RoundChangeMsg

    Proposer <- MCProposer

CHECK_DEADLOCK
    FALSE

CONSTRAINT
    MsgBufferConstraint

\* ============================================================================
\* MC-5: CommittedStuckDetector — expected to be violated
\* ============================================================================
INVARIANTS
    CommittedStuckDetector
    Agreement
