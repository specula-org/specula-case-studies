    Proposing  = "Proposing"
    Prepared   = "Prepared"
    Committed  = "Committed"

    Nil = Nil

    ProposalMsg    = "ProposalMsg"
    PrepareMsg     = "PrepareMsg"
    CommitMsg      = "CommitMsg"
    RoundChangeMsg = "RoundChangeMsg"

    \* Proposer selection: round-robin matching besu implementation
    Proposer <- TraceProposer

ALIAS TraceAlias

INVARIANTS
    Agreement
    PreparedBlockIntegrity
INVARIANT NotDone
