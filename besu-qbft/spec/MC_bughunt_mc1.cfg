SPECIFICATION MCBughuntSpec

CONSTANTS
    s1 = s1
    s2 = s2
    s3 = s3
    s4 = s4

    Server = {s1, s2, s3, s4}

    \* Constraint limits — small config for PeerSync tractability
    MaxRoundLimit       = 2
    MaxRoundExpiryLimit = 3
    CrashLimit          = 1
    LoseLimit           = 1
    BlockTimerLimit     = 4
    MaxMsgBufferLimit   = 6
    PeerSyncLimit       = 1

    \* Action overrides
    BlockTimerExpiry <- MCBlockTimerExpiry
    RoundExpiry      <- MCRoundExpiry
    Crash            <- MCCrash
    LoseMessage      <- MCLoseMessage

    \* Type constants
    Nil = Nil

    Proposing  = Proposing
    Prepared   = Prepared
    Committed  = Committed

    ProposalMsg    = ProposalMsg
    PrepareMsg     = PrepareMsg
    CommitMsg      = CommitMsg
    RoundChangeMsg = RoundChangeMsg

    \* Round-robin proposer override
    Proposer <- MCProposer

CHECK_DEADLOCK
    FALSE

CONSTRAINT
    MsgBufferConstraint

\* ============================================================================
\* Core Safety — must hold even with PeerSync
\* ============================================================================
INVARIANTS
    Agreement
    Validity
    PreparedBlockIntegrity
    CommitLatchConsistency
    CommittedMonotonic

\* ============================================================================
\* MC-1 targeted invariant
\* ============================================================================
INVARIANTS
    NoConsensusAfterImport

\* ============================================================================
\* Structural invariants
\* ============================================================================
INVARIANTS
    RoundBoundInv
    ImportImpliesHeightInv
    CommittedImpliesProposalInv
    RoundChangeSafety
    PhaseConsistency

\* ============================================================================
\* Temporal Properties
\* ============================================================================
PROPERTIES
    MonotonicRoundProp
    MonotonicBlockchainHeightProp
