SPECIFICATION MCSpec

CONSTANTS
    s1 = s1
    s2 = s2
    s3 = s3
    s4 = s4

    Server = {s1, s2, s3, s4}

    \* Constraint limits — MaxRound=2 for round change coverage
    MaxRoundLimit       = 2
    MaxRoundExpiryLimit = 3
    CrashLimit          = 1
    LoseLimit           = 1
    BlockTimerLimit     = 4
    MaxMsgBufferLimit   = 6
    PeerSyncLimit       = 0

    \* Action overrides
    BlockTimerExpiry <- MCBlockTimerExpiry
    RoundExpiry      <- MCRoundExpiry
    Crash            <- MCCrash
    LoseMessage      <- MCLoseMessage

    \* MC-6: Override BestPrepared with wrong (lowest) selection
    BestPrepared <- MCBestPreparedWrong

    \* Type constants
    Nil = Nil

    Proposing  = Proposing
    Prepared   = Prepared
    Committed  = Committed

    ProposalMsg    = ProposalMsg
    PrepareMsg     = PrepareMsg
    CommitMsg      = CommitMsg
    RoundChangeMsg = RoundChangeMsg

    \* Round-robin proposer override
    Proposer <- MCProposer

CHECK_DEADLOCK
    FALSE

CONSTRAINT
    MsgBufferConstraint

\* ============================================================================
\* Core Safety — must hold even with broken comparator
\* ============================================================================
INVARIANTS
    Agreement
    Validity
    PreparedBlockIntegrity
    CommitLatchConsistency
    CommittedMonotonic

\* ============================================================================
\* Structural invariants
\* ============================================================================
INVARIANTS
    RoundBoundInv
    ImportImpliesHeightInv
    CommittedImpliesProposalInv
    RoundChangeSafety
    PhaseConsistency

\* ============================================================================
\* Temporal Properties
\* ============================================================================
PROPERTIES
    MonotonicRoundProp
    MonotonicBlockchainHeightProp
