\* MC_hunt2.cfg — Bug hunting run 2: Test MC-1 (independent round tracking)
\*
\* Same as MC.cfg but adds IndependentRoundTracking and RoundMonotonicity invariants.
\* EpochIsolation removed (trivially violated by in-flight messages after epoch change).

CONSTANTS
    \* System parameters
    Server = {s1, s2, s3}
    MaxRound = 4
    Quorum = 2
    Values = {v1, v2}
    Nil = Nil

    \* Message types (model values)
    ProposalMsgType = ProposalMsgType
    VoteMsgType = VoteMsgType
    OrderVoteMsgType = OrderVoteMsgType
    TimeoutMsgType = TimeoutMsgType
    CommitVoteMsgType = CommitVoteMsgType

    \* Pipeline phases (model values)
    Ordered = Ordered
    Executed = Executed
    Signed = Signed
    Aggregated = Aggregated

    \* Fault-injection limits
    MaxTimeoutLimit = 4
    MaxCrashLimit = 2
    MaxCrashPersistLimit = 1
    MaxDropLimit = 3
    MaxSyncLimit = 2
    MaxEpochChangeLimit = 1
    MaxMsgBufferLimit = 10

SPECIFICATION MCSpec

SYMMETRY MCSymmetry

VIEW MCView

CONSTRAINT MsgBufferConstraint

\* Safety invariants
INVARIANTS
    VoteSafety
    OrderVoteSafety
    CommitSafety
    NoDoubleVoteAfterCrash
    CommitVoteConsistency
    PipelineMonotonicity

\* Structural + MC-1 invariants
INVARIANTS
    RoundPositive
    QCRoundBound
    TCRoundBound
    LVRBound
    IndependentRoundTracking
    RoundMonotonicity
