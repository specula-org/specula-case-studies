\* MC.cfg — Model checking configuration for Aptos BFT
\*
\* Recommended starting point: 3 servers (f=0, or up to 1 faulty for f=1 with 4)
\* With 3 servers: Quorum=2 (2f+1 where f=0, or n=3 where 2*2>3 → need 3 for super-majority)

CONSTANTS
    \* System parameters
    Server = {s1, s2, s3}
    MaxRound = 4
    Quorum = 2
    Values = {v1, v2}
    Nil = Nil

    \* Message types (model values)
    ProposalMsgType = ProposalMsgType
    VoteMsgType = VoteMsgType
    OrderVoteMsgType = OrderVoteMsgType
    TimeoutMsgType = TimeoutMsgType
    CommitVoteMsgType = CommitVoteMsgType

    \* Pipeline phases (model values)
    Ordered = Ordered
    Executed = Executed
    Signed = Signed
    Aggregated = Aggregated

    \* Fault-injection limits
    MaxTimeoutLimit = 4
    MaxCrashLimit = 2
    MaxCrashPersistLimit = 1
    MaxDropLimit = 3
    MaxSyncLimit = 2
    MaxEpochChangeLimit = 1
    MaxMsgBufferLimit = 10

SPECIFICATION MCSpec

\* Action overrides (redirect base actions to MC wrappers)
\* The MC spec redefines Next, so no overrides needed — MCNext is used directly.

SYMMETRY MCSymmetry

VIEW MCView

CONSTRAINT MsgBufferConstraint

\* Safety invariants
INVARIANTS
    VoteSafety
    OrderVoteSafety
    CommitSafety
    NoDoubleVoteAfterCrash
    CommitVoteConsistency
    PipelineMonotonicity

\* Structural invariants
INVARIANTS
    RoundPositive
    QCRoundBound
    TCRoundBound
    LVRBound

\* Temporal properties (comment out for BFS, enable for simulation)
\* PROPERTIES
\*     TimeoutLiveness
\*     OrderVoteLiveness
