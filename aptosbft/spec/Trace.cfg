\* Trace.cfg — Trace validation configuration for Aptos BFT
\*
\* Usage:
\*   java -jar tla2tools.jar -config Trace.cfg Trace.tla \
\*     -DJSON=../traces/trace.ndjson

CONSTANTS
    \* System parameters — must match the trace
    \* NOTE: Server IDs are strings to match JSON trace values
    Server = {"s1", "s2", "s3"}
    MaxRound = 20
    Quorum = 2
    Values = {"v1", "v2"}
    Nil = "Nil"

    \* Message types (model values)
    ProposalMsgType = ProposalMsgType
    VoteMsgType = VoteMsgType
    OrderVoteMsgType = OrderVoteMsgType
    TimeoutMsgType = TimeoutMsgType
    CommitVoteMsgType = CommitVoteMsgType

    \* Pipeline phases (model values)
    Ordered = Ordered
    Executed = Executed
    Signed = Signed
    Aggregated = Aggregated

SPECIFICATION TraceSpec

CHECK_DEADLOCK FALSE

\* Verify entire trace is consumed
PROPERTIES TraceMatched

\* Safety invariants checked during trace replay
INVARIANTS
    VoteSafety
    OrderVoteSafety
    CommitSafety
    NoDoubleVoteAfterCrash
    CommitVoteConsistency
