\* MC_sim.cfg — Bug hunting simulation: MC-2, MC-4, MC-6
\*
\* Uses simulation mode with higher fault limits and deeper traces.
\* Targets commit vote gaps (MC-2), crash/recovery (MC-4), and
\* epoch+pipeline interleaving (MC-6).
\*
\* Key settings:
\* - Higher MaxCrashPersistLimit (2) for MC-4
\* - Higher MaxEpochChangeLimit (2) for MC-6
\* - All safety invariants enabled

CONSTANTS
    \* System parameters
    Server = {s1, s2, s3}
    MaxRound = 5
    Quorum = 2
    Values = {v1, v2}
    Nil = Nil

    \* Message types (model values)
    ProposalMsgType = ProposalMsgType
    VoteMsgType = VoteMsgType
    OrderVoteMsgType = OrderVoteMsgType
    TimeoutMsgType = TimeoutMsgType
    CommitVoteMsgType = CommitVoteMsgType

    \* Pipeline phases (model values)
    Ordered = Ordered
    Executed = Executed
    Signed = Signed
    Aggregated = Aggregated

    \* Fault-injection limits — higher for deeper exploration
    MaxTimeoutLimit = 5
    MaxCrashLimit = 3
    MaxCrashPersistLimit = 2
    MaxDropLimit = 4
    MaxSyncLimit = 3
    MaxEpochChangeLimit = 2
    MaxMsgBufferLimit = 12

SPECIFICATION MCSpec

SYMMETRY MCSymmetry

VIEW MCView

CONSTRAINT MsgBufferConstraint

\* All safety invariants
INVARIANTS
    VoteSafety
    OrderVoteSafety
    CommitSafety
    NoDoubleVoteAfterCrash
    CommitVoteConsistency
    PipelineMonotonicity

\* Structural invariants
INVARIANTS
    RoundPositive
    IndependentRoundTracking
    RoundMonotonicity
