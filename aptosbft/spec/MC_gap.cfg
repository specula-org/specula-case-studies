\* MC_gap.cfg — Quick check: OrderVoteGap (MC-1 structural gap)
\*
\* Minimal config to find OrderVoteGap violation quickly.
\* This shows the independent round tracking gap exists.

CONSTANTS
    Server = {s1, s2, s3}
    MaxRound = 3
    Quorum = 2
    Values = {v1}
    Nil = Nil

    ProposalMsgType = ProposalMsgType
    VoteMsgType = VoteMsgType
    OrderVoteMsgType = OrderVoteMsgType
    TimeoutMsgType = TimeoutMsgType
    CommitVoteMsgType = CommitVoteMsgType

    Ordered = Ordered
    Executed = Executed
    Signed = Signed
    Aggregated = Aggregated

    MaxTimeoutLimit = 1
    MaxCrashLimit = 0
    MaxCrashPersistLimit = 0
    MaxDropLimit = 0
    MaxSyncLimit = 0
    MaxEpochChangeLimit = 0
    MaxMsgBufferLimit = 10

SPECIFICATION MCSpec

SYMMETRY MCSymmetry

VIEW MCView

CONSTRAINT MsgBufferConstraint

\* Only check the gap invariant
INVARIANTS
    OrderVoteGap
