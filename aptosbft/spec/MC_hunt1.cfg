\* MC_hunt1.cfg — Bug hunting run 1: Enable all invariants
\*
\* Adds EpochIsolation, IndependentRoundTracking, RoundMonotonicity
\* to the existing safety and structural invariants.
\* Tests MC-1 (independent round tracking), MC-3/MC-5 (epoch isolation, partial)

CONSTANTS
    \* System parameters
    Server = {s1, s2, s3}
    MaxRound = 4
    Quorum = 2
    Values = {v1, v2}
    Nil = Nil

    \* Message types (model values)
    ProposalMsgType = ProposalMsgType
    VoteMsgType = VoteMsgType
    OrderVoteMsgType = OrderVoteMsgType
    TimeoutMsgType = TimeoutMsgType
    CommitVoteMsgType = CommitVoteMsgType

    \* Pipeline phases (model values)
    Ordered = Ordered
    Executed = Executed
    Signed = Signed
    Aggregated = Aggregated

    \* Fault-injection limits
    MaxTimeoutLimit = 4
    MaxCrashLimit = 2
    MaxCrashPersistLimit = 1
    MaxDropLimit = 3
    MaxSyncLimit = 2
    MaxEpochChangeLimit = 1
    MaxMsgBufferLimit = 10

SPECIFICATION MCSpec

SYMMETRY MCSymmetry

VIEW MCView

CONSTRAINT MsgBufferConstraint

\* All safety invariants (including previously disabled ones)
INVARIANTS
    VoteSafety
    OrderVoteSafety
    CommitSafety
    NoDoubleVoteAfterCrash
    CommitVoteConsistency
    PipelineMonotonicity
    EpochIsolation
    IndependentRoundTracking
    RoundMonotonicity

\* Structural invariants
INVARIANTS
    RoundPositive
    QCRoundBound
    TCRoundBound
    LVRBound
