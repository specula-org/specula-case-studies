\* base.cfg — Base configuration for Aptos BFT spec
\* Not used directly; MC.cfg and Trace.cfg override constants.

CONSTANTS
    Nil = Nil
    ProposalMsgType = ProposalMsgType
    VoteMsgType = VoteMsgType
    OrderVoteMsgType = OrderVoteMsgType
    TimeoutMsgType = TimeoutMsgType
    CommitVoteMsgType = CommitVoteMsgType
    Ordered = Ordered
    Executed = Executed
    Signed = Signed
    Aggregated = Aggregated

SPECIFICATION Spec

INVARIANTS
    VoteSafety
    OrderVoteSafety
    CommitSafety
    EpochIsolation
    NoDoubleVoteAfterCrash
    CommitVoteConsistency
    PipelineMonotonicity
