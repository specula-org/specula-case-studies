\* MC_epoch.cfg — Bug hunting: MC-3 (cross-epoch TC) and MC-5 (cross-epoch ordering cert)
\*
\* Uses MC_epoch.tla which adds weak-epoch receive actions modeling
\* debug_assert compiled out in release builds.
\* MaxEpochChangeLimit increased to 2 to allow more epoch transitions.

CONSTANTS
    \* System parameters
    Server = {s1, s2, s3}
    MaxRound = 3
    Quorum = 2
    Values = {v1, v2}
    Nil = Nil

    \* Message types (model values)
    ProposalMsgType = ProposalMsgType
    VoteMsgType = VoteMsgType
    OrderVoteMsgType = OrderVoteMsgType
    TimeoutMsgType = TimeoutMsgType
    CommitVoteMsgType = CommitVoteMsgType

    \* Pipeline phases (model values)
    Ordered = Ordered
    Executed = Executed
    Signed = Signed
    Aggregated = Aggregated

    \* Fault-injection limits
    MaxTimeoutLimit = 3
    MaxCrashLimit = 1
    MaxCrashPersistLimit = 1
    MaxDropLimit = 2
    MaxSyncLimit = 1
    MaxEpochChangeLimit = 2
    MaxMsgBufferLimit = 8
    MaxWeakEpochLimit = 3

SPECIFICATION MCEpochSpec

SYMMETRY MCSymmetry

VIEW MCEpochView

CONSTRAINT MsgBufferConstraint

\* Safety invariants — checking if weak-epoch actions cause violations
INVARIANTS
    VoteSafety
    OrderVoteSafety
    CommitSafety
    CommitVoteConsistency

\* Structural invariants
INVARIANTS
    RoundPositive
