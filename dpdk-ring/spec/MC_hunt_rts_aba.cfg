\* MC_hunt_rts_aba.cfg — Bug Family 4: RTS counter overflow / ABA
\* Tests: small counter domain forces wraparound, checks ABA
\* Tight bounds: RTS mode, CntMax=3 (wraps fast), no stalls

SPECIFICATION MCSpec

CONSTANTS
    Thread = {t1, t2, t3}
    Capacity = 3
    Mode = "RTS"
    MaxBatch = 1
    HTDMax = 2
    CntMax = 3
    StallLimit = 0
    StaleLimit = 0
    StaleHeadLimit = 0
    EnqueueBound = 8

CONSTRAINT StateConstraint

INVARIANTS
    MCRingSafety
    MCCapacityBound
    MCCounterConsistency
    MCNoABA
