\* MC_hunt_rts_aba_v2.cfg — Bug Family 4: ABA with CntMax=2
\* CntMax=2 forces counter wraparound with 3 threads (ABA inevitable)
\* HTDMax=3 allows all 3 threads in-flight simultaneously
\* Expected: NoABA or NoGarbageEnqueued violation (algorithmic ABA)

SPECIFICATION MCSpec

CONSTANTS
    Thread = {t1, t2, t3}
    Capacity = 3
    Mode = "RTS"
    MaxBatch = 1
    HTDMax = 3
    CntMax = 2
    StallLimit = 0
    StaleLimit = 0
    StaleHeadLimit = 0
    EnqueueBound = 8

CONSTRAINT StateConstraint

INVARIANTS
    MCRingSafety
    MCCapacityBound
    MCNoGarbageEnqueued
    \* MCNoABA  \* disabled — known to fire at CntMax=2; testing if ABA causes data corruption
