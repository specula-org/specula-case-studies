\* MC_hunt_batch.cfg — MPMC with MaxBatch=2
\* Tests batch enqueue/dequeue for FIFO correctness and capacity safety

SPECIFICATION MCSpec

CONSTANTS
    Thread = {t1, t2, t3}
    Capacity = 3
    Mode = "MPMC"
    MaxBatch = 2
    HTDMax = 2
    CntMax = 4
    StallLimit = 0
    StaleLimit = 0
    StaleHeadLimit = 0
    EnqueueBound = 8

CONSTRAINT StateConstraint

INVARIANTS
    MCRingSafety
    MCCapacityBound
    MCNoGarbageEnqueued
