\* Trace validation config for DPDK rte_ring
\* Uses INIT/NEXT (not SPECIFICATION) for deadlock-based completion checking

INIT TraceInit
NEXT TraceNext

CONSTANTS
    Thread = {"t1", "t2", "t3"}
    Capacity = 3
    Mode = "MPMC"
    MaxBatch = 1
    HTDMax = 2
    CntMax = 4

INVARIANTS
    RingSafety
    CapacityBound

\* Deadlock checking is ENABLED (no -deadlock flag)
\* TLC will report deadlock when trace is fully consumed — this is expected success
