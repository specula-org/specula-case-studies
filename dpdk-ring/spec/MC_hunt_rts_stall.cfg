\* MC_hunt_rts_stall.cfg — Bug Family 1 (RTS variant): bounded stall
\* Tests: RTS allows progress even with one stalled thread (up to HTDMax)
\* TailProgress should PASS for non-stalled threads

SPECIFICATION MCSpec

CONSTANTS
    Thread = {t1, t2, t3}
    Capacity = 3
    Mode = "RTS"
    MaxBatch = 1
    HTDMax = 2
    CntMax = 4
    StallLimit = 1
    StaleLimit = 0
    StaleHeadLimit = 0
    EnqueueBound = 6

CONSTRAINT StateConstraint

INVARIANTS
    MCRingSafety
    MCCapacityBound
    MCCounterConsistency
