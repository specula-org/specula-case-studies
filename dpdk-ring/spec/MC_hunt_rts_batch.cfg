\* MC_hunt_rts_batch.cfg — RTS with MaxBatch=2
\* Tests batch enqueue/dequeue in RTS mode with counter tracking

SPECIFICATION MCSpec

CONSTANTS
    Thread = {t1, t2, t3}
    Capacity = 3
    Mode = "RTS"
    MaxBatch = 2
    HTDMax = 3
    CntMax = 4
    StallLimit = 0
    StaleLimit = 0
    StaleHeadLimit = 0
    EnqueueBound = 8

CONSTRAINT StateConstraint

INVARIANTS
    MCRingSafety
    MCCapacityBound
    MCCounterConsistency
    MCNoABA
    MCNoGarbageEnqueued
