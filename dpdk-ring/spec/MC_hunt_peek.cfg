\* MC_hunt_peek.cfg — Bug Family 3: Peek mode atomicity gaps
\* Tests: double-START deadlock, crash between START/FINISH
\* Use HTS mode (only MT mode supporting peek)

SPECIFICATION MCSpec

CONSTANTS
    Thread = {t1, t2, t3}
    Capacity = 3
    Mode = "HTS"
    MaxBatch = 1
    HTDMax = 2
    CntMax = 4
    StallLimit = 2
    StaleLimit = 0
    StaleHeadLimit = 0
    EnqueueBound = 4

CONSTRAINT StateConstraint

INVARIANTS
    MCRingSafety
    MCCapacityBound
    MCHTSSingleInFlight
