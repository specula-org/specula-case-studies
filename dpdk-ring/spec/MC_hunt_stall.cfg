\* MC_hunt_stall.cfg — Bug Family 1: Two-phase commit stall / liveness
\* Tests: MPMC stall blocks all tail progress; RTS bounded stall
\* Tight bounds: enable stall, minimize stale reads

SPECIFICATION MCSpec

CONSTANTS
    Thread = {t1, t2, t3}
    Capacity = 3
    Mode = "MPMC"
    MaxBatch = 1
    HTDMax = 2
    CntMax = 4
    StallLimit = 2
    StaleLimit = 0
    StaleHeadLimit = 0
    EnqueueBound = 4

CONSTRAINT StateConstraint

INVARIANTS
    MCRingSafety
    MCCapacityBound

\* Family 1: verify stall behavior
\* With stall enabled + MPMC, TailProgress should FAIL
PROPERTY TailProgress
