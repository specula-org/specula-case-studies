\* MC_hunt_rts_stalehead.cfg — Stale RELAXED head read in RTSPublishTail
\* Tests if stale head during update_tail can cause ABA or garbage exposure
\* CntMax=3 is safe with fresh reads; stale reads may break it

SPECIFICATION MCSpec

CONSTANTS
    Thread = {t1, t2, t3}
    Capacity = 3
    Mode = "RTS"
    MaxBatch = 1
    HTDMax = 2
    CntMax = 4
    StallLimit = 0
    StaleLimit = 0
    StaleHeadLimit = 2
    EnqueueBound = 8

CONSTRAINT StateConstraint

INVARIANTS
    MCRingSafety
    MCCapacityBound
    MCCounterConsistency
    MCNoABA
    MCNoGarbageEnqueued
