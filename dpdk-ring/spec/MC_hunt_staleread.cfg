\* MC_hunt_staleread.cfg — Bug Family 2: Memory ordering / stale read
\* Tests: stale tail reads cause capacity underflow
\* Tight bounds: enable stale reads, minimize stalls

SPECIFICATION MCSpec

CONSTANTS
    Thread = {t1, t2, t3}
    Capacity = 3
    Mode = "MPMC"
    MaxBatch = 1
    HTDMax = 2
    CntMax = 4
    StallLimit = 0
    StaleLimit = 4
    StaleHeadLimit = 0
    EnqueueBound = 6

CONSTRAINT StateConstraint

INVARIANTS
    MCRingSafety
    MCCapacityBound
