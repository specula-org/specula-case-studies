\* TLC Trace Validation configuration for dragonboat.
\* Usage: set JSON env variable to the trace file path.
\*   tlc -config Trace.cfg -deadlock -noTE Trace.tla

SPECIFICATION TraceSpec

CONSTANTS
    \* Server set — must match node IDs in the trace file.
    \* dragonboat emits numeric string IDs: "1", "2", "3".
    Server = {"1", "2", "3"}

    \* Node states
    Follower    = Follower
    Candidate   = Candidate
    Leader      = Leader

    \* Sentinel
    Nil         = Nil

    \* Entry types
    ApplicationEntry  = ApplicationEntry
    ConfigChangeEntry = ConfigChangeEntry

    \* Message types
    RequestVoteRequest      = RequestVoteRequest
    RequestVoteResponse     = RequestVoteResponse
    ReplicateRequest        = ReplicateRequest
    ReplicateResponse       = ReplicateResponse
    HeartbeatRequest        = HeartbeatRequest
    HeartbeatResponse       = HeartbeatResponse
    InstallSnapshotRequest  = InstallSnapshotRequest
    SnapshotStatus          = SnapshotStatus

    \* Remote state types
    RemoteRetry     = RemoteRetry
    RemoteWait      = RemoteWait
    RemoteReplicate = RemoteReplicate
    RemoteSnapshot  = RemoteSnapshot


INVARIANTS
    ElectionSafety
    LogMatching
    CommitIndexBound
    AppliedBound

PROPERTIES
    TraceMatched
