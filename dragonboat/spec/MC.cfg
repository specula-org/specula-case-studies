\* TLC Model Checking configuration for dragonboat MC spec.
\* Target: MC-1 (snapshot active tracking) + MC-4 (silent persistence failure)

SPECIFICATION MCSpec

CONSTANTS
    \* Server set (3-node cluster)
    Server = {s1, s2, s3}

    \* Node states
    Follower    = Follower
    Candidate   = Candidate
    Leader      = Leader

    \* Sentinel
    Nil         = Nil

    \* Entry types
    ApplicationEntry  = ApplicationEntry
    ConfigChangeEntry = ConfigChangeEntry

    \* Message types
    RequestVoteRequest      = RequestVoteRequest
    RequestVoteResponse     = RequestVoteResponse
    ReplicateRequest        = ReplicateRequest
    ReplicateResponse       = ReplicateResponse
    HeartbeatRequest        = HeartbeatRequest
    HeartbeatResponse       = HeartbeatResponse
    InstallSnapshotRequest  = InstallSnapshotRequest
    SnapshotStatus          = SnapshotStatus

    \* Remote state types
    RemoteRetry     = RemoteRetry
    RemoteWait      = RemoteWait
    RemoteReplicate = RemoteReplicate
    RemoteSnapshot  = RemoteSnapshot

    \* Bounds
    MaxTermLimit      = 4
    MaxTimeoutLimit   = 5
    RequestLimit      = 3
    CrashLimit        = 2
    LoseLimit         = 3
    HeartbeatLimit    = 6
    CheckQuorumLimit  = 4
    DiskErrorLimit    = 2
    ConfigChangeLimit = 2
    SnapshotLimit     = 2
    MaxMsgBufferLimit = 10

SYMMETRY Symmetry
VIEW ModelView

CONSTRAINT MsgBufferConstraint

INVARIANTS
    ElectionSafety
    LogMatching
    LeaderCompleteness
    ConfigChangeSingleAtATime
    PendingConfigChangeConsistency
    CommitIndexBound
    AppliedBound
    CommitIndexBoundInv
    AppliedBoundInv
    CandidateVotedForSelfInv
    LeaderTermPositiveInv
    PersistedTermConsistencyInv
    MatchIndexBoundInv

\* Uncomment to check bug-family-specific invariants:
\* INVARIANTS
\*     SnapshotActiveTracking       \* MC-1: should be violated
\*     CommittedEntriesPersisted    \* MC-4: should be violated

PROPERTIES
    MonotonicCommitIndexProp
    MonotonicTermProp
    LeaderAppendOnlyProp
    LeaderCommitCurrentTermProp
