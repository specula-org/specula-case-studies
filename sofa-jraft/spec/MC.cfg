SPECIFICATION MCSpecDynamic

CONSTANTS
    s1 = s1
    s2 = s2
    s3 = s3

    Server = {s1, s2, s3}

    \* Constraint limits — tuned for tractable state space with 3 servers
    MaxTermLimit        = 4
    MaxTimeoutLimit     = 5
    RequestLimit        = 3
    CrashLimit          = 2
    CorruptedCrashLimit = 1
    LoseLimit           = 3
    HeartbeatLimit      = 6
    SnapshotLimit       = 2
    ConfigChangeLimit   = 2
    MaxMsgBufferLimit   = 10

    \* Action overrides (inject counter constraints via operator replacement)
    ElectSelf           <- MCElectSelf
    ClientRequest       <- MCClientRequest
    Crash               <- MCCrash
    CorruptedCrash      <- MCCorruptedCrash
    LoseMessage         <- MCLoseMessage
    SendHeartbeat       <- MCSendHeartbeat
    SendInstallSnapshot <- MCSendInstallSnapshot
    ProposeConfigChange <- MCProposeConfigChange

    \* Type constants
    Nil = Nil

    Follower    = Follower
    Candidate   = Candidate
    Leader      = Leader

    ValueEntry  = ValueEntry
    ConfigEntry = ConfigEntry

    RequestVoteRequest      = RequestVoteRequest
    RequestVoteResponse     = RequestVoteResponse
    AppendEntriesRequest    = AppendEntriesRequest
    AppendEntriesResponse   = AppendEntriesResponse
    InstallSnapshotRequest  = InstallSnapshotRequest
    InstallSnapshotResponse = InstallSnapshotResponse

SYMMETRY Symmetry

CHECK_DEADLOCK
    FALSE

\* ============================================================================
\* State Space Pruning
\* ============================================================================
CONSTRAINT
    MsgBufferConstraint

\* ============================================================================
\* Core Raft Safety Invariants (from base spec)
\* ============================================================================
INVARIANTS
    ElectionSafety
    LogMatching
    LeaderCompleteness
    ConfigSafety

\* ============================================================================
\* Structural Invariants (from MC spec)
\* ============================================================================
INVARIANTS
    PersistedTermConsistencyInv
    CommitIndexBoundInv
    CandidateVotedForSelfInv
    LeaderTermPositiveInv
    PendingVoteStateInv
    ConfigValidInv
    LeaderLogCompleteness

\* ============================================================================
\* Bug Detection Invariants
\* Known bugs in sofa-jraft — enable to reproduce violations.
\* ============================================================================
\* INVARIANTS
\*     VoteOncePerTerm
\*     TermMonotonicity

\* ============================================================================
\* Temporal Properties
\* ============================================================================
PROPERTIES
    MonotonicCommitIndexProp
    MonotonicTermProp
    LeaderAppendOnlyProp
    LeaderCommitCurrentTermLogsProp
