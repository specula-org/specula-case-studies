SPECIFICATION MCSpec

CONSTANTS
    s1 = s1
    s2 = s2
    s3 = s3

    Server = {s1, s2, s3}

    \* Bounds for Family 2: missing term check on success response
    \* Need multiple elections to get term mismatch
    MaxTermLimit        = 3
    MaxTimeoutLimit     = 4
    RequestLimit        = 2
    CrashLimit          = 0
    CorruptedCrashLimit = 0
    LoseLimit           = 3
    HeartbeatLimit      = 3
    SnapshotLimit       = 1
    ConfigChangeLimit   = 0
    MaxMsgBufferLimit   = 8

    \* Action overrides
    ElectSelf           <- MCElectSelf
    ClientRequest       <- MCClientRequest
    Crash               <- MCCrash
    CorruptedCrash      <- MCCorruptedCrash
    LoseMessage         <- MCLoseMessage
    SendHeartbeat       <- MCSendHeartbeat
    SendInstallSnapshot <- MCSendInstallSnapshot
    ProposeConfigChange <- MCProposeConfigChange

    Nil = Nil
    Follower    = Follower
    Candidate   = Candidate
    Leader      = Leader
    ValueEntry  = ValueEntry
    ConfigEntry = ConfigEntry
    RequestVoteRequest      = RequestVoteRequest
    RequestVoteResponse     = RequestVoteResponse
    AppendEntriesRequest    = AppendEntriesRequest
    AppendEntriesResponse   = AppendEntriesResponse
    InstallSnapshotRequest  = InstallSnapshotRequest
    InstallSnapshotResponse = InstallSnapshotResponse

SYMMETRY Symmetry

CHECK_DEADLOCK
    FALSE

CONSTRAINT
    MsgBufferConstraint

\* Target: detect stale leader / stale message issues from Family 2
INVARIANTS
    ElectionSafety
    LogMatching
    CommitIndexBoundInv
    LeaderLogCompleteness
