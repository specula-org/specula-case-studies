SPECIFICATION MCSpec

CONSTANTS
    s1 = s1
    s2 = s2
    s3 = s3

    Server = {s1, s2, s3}

    \* Tight bounds: focus on PreVote + election + lease interactions
    MaxTermLimit        = 3
    MaxPreVoteLimit     = 4
    MaxTimeoutLimit     = 4
    RequestLimit        = 0
    CrashLimit          = 0
    LoseLimit           = 2
    HeartbeatLimit      = 4
    SnapshotLimit       = 0
    ConfigChangeLimit   = 0
    LeaseExpireLimit    = 3
    MaxMsgBufferLimit   = 8

    \* Action overrides
    PreVote              <- MCPreVote
    ElectSelf            <- MCElectSelf
    ClientRequest        <- MCClientRequest
    Crash                <- MCCrash
    LoseMessage          <- MCLoseMessage
    SendHeartbeat        <- MCSendHeartbeat
    SendInstallSnapshot  <- MCSendInstallSnapshot
    ProposeConfigChange  <- MCProposeConfigChange
    FollowerLeaseExpire  <- MCFollowerLeaseExpire

    \* Type constants
    Nil = Nil
    Follower    = Follower
    Candidate   = Candidate
    Leader      = Leader
    ValueEntry  = ValueEntry
    ConfigEntry = ConfigEntry

    PreVoteRequest          = PreVoteRequest
    PreVoteResponse         = PreVoteResponse
    RequestVoteRequest      = RequestVoteRequest
    RequestVoteResponse     = RequestVoteResponse
    AppendEntriesRequest    = AppendEntriesRequest
    AppendEntriesResponse   = AppendEntriesResponse
    InstallSnapshotRequest  = InstallSnapshotRequest
    InstallSnapshotResponse = InstallSnapshotResponse

SYMMETRY Symmetry

CHECK_DEADLOCK
    FALSE

CONSTRAINT
    MsgBufferConstraint

\* Core safety invariants
INVARIANTS
    ElectionSafety
    LogMatching

\* Bug Family 1 detection invariants
INVARIANTS
    LeaseImpliesLeadership
